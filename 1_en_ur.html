            ["say", "کہتا"],
            ["let", "اس", "کہ"],
            ["become", "کو", "ہو"],
            ["symbol", "امید"],
            ["hope", "امید"],
            ["unity", "انتہائی"],
            ["service", "سرویس"],
            ["prove", "پروفی"],
            ["that", "کہ"],
            ["politics", "پولیٹکس"],
            ["public", "پبلک"],
            ["zinda", "زندہ"],
            ["bad", "باد", "واد"]
        ];

        function areWordsEqual(w1, w2) {
            if (w1 === w2) return true;
            for (let group of equivalenceGroups) {
                if (group.includes(w1) && group.includes(w2)) {
                    return true;
                }
            }
            return false;
        }

        // WER Calculation logic using Levenshtein distance sequence alignment
        function calculateWER(refText, hypText) {
            // Normalize texts: remove punctuation characters and lower case
            const normalize = w => w.toLowerCase().replace(/[.,!?"()،۔؛٪|]/g, '');

            const refTokensOrig = refText.trim().split(/\s+/).filter(w => w.length > 0);
            const hypTokensOrig = hypText.trim().split(/\s+/).filter(w => w.length > 0);

            const refTokens = refTokensOrig.map(normalize);
            const hypTokens = hypTokensOrig.map(normalize);

            const n = refTokens.length;
            const m = hypTokens.length;

            // DP Table
            const dp = Array.from({ length: n + 1 }, () => Array(m + 1).fill(0));
            const ops = Array.from({ length: n + 1 }, () => Array(m + 1).fill(''));

            for (let i = 0; i <= n; i++) { dp[i][0] = i; ops[i][0] = 'D'; }
            for (let j = 0; j <= m; j++) { dp[0][j] = j; ops[0][j] = 'I'; }
            ops[0][0] = 'M';

            // Fill DP Table
            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    // Check strict equality OR cross-lingual equivalence
                    let isMatch = areWordsEqual(refTokens[i - 1], hypTokens[j - 1]);
                    let cost = isMatch ? 0 : 1;
                    
                    let subCost = dp[i - 1][j - 1] + cost;
                    let delCost = dp[i - 1][j] + 1;
                    let insCost = dp[i][j - 1] + 1;

                    dp[i][j] = Math.min(subCost, delCost, insCost);

                    if (dp[i][j] === subCost) {
                        ops[i][j] = cost === 0 ? 'M' : 'S';
                    } else if (dp[i][j] === delCost) {
                        ops[i][j] = 'D';
                    } else {
                        ops[i][j] = 'I';
                    }
                }
            }

            // Backtrack to build the highlighted output
            let i = n, j = m;
            let alignment = [];
            let subs = 0, dels = 0, ins = 0;

            while (i > 0 || j > 0) {
                if (ops[i][j] === 'M') {
                    alignment.unshift({ type: 'M', ref: refTokensOrig[i-1], hyp: hypTokensOrig[j-1] });
                    i--; j--;
                } else if (ops[i][j] === 'S') {
                    alignment.unshift({ type: 'S', ref: refTokensOrig[i-1], hyp: hypTokensOrig[j-1] });
                    subs++; i--; j--;
                } else if (ops[i][j] === 'D') {
                    alignment.unshift({ type: 'D', ref: refTokensOrig[i-1], hyp: null });
                    dels++; i--;
                } else if (ops[i][j] === 'I') {
                    alignment.unshift({ type: 'I', ref: null, hyp: hypTokensOrig[j-1] });
                    ins++; j--;
                }
            }

            const wer = n > 0 ? ((subs + dels + ins) / n) * 100 : 0;

            // Generate HTML Output
            let html = '';
            alignment.forEach(item => {
                if (item.type === 'M') {
                    html += `<span>${item.hyp}</span> `;
                } else if (item.type === 'S') {
                    html += `<span class="bg-yellow-200 dark:bg-yellow-900/50 text-yellow-900 dark:text-yellow-200 px-1.5 py-0.5 custom-rounded inline-block mx-0.5 border border-yellow-300 dark:border-yellow-700 cursor-help transition-colors hover:bg-yellow-300 dark:hover:bg-yellow-800" title="Changed (Original: ${item.ref})">${item.hyp}</span> `;
                } else if (item.type === 'D') {
                    html += `<span class="bg-red-100 dark:bg-red-900/40 text-red-800 dark:text-red-300 px-1.5 py-0.5 custom-rounded inline-block mx-0.5 line-through border border-red-300 dark:border-red-800 cursor-help transition-colors hover:bg-red-200 dark:hover:bg-red-800" title="Missing Word">${item.ref}</span> `;
                } else if (item.type === 'I') {
                    html += `<span class="bg-green-200 dark:bg-green-900/50 text-green-900 dark:text-green-200 px-1.5 py-0.5 custom-rounded inline-block mx-0.5 border border-green-300 dark:border-green-700 cursor-help transition-colors hover:bg-green-300 dark:hover:bg-green-800" title="Inserted Word">${item.hyp}</span> `;
                }
            });

            return { html, wer: wer.toFixed(1), subs, dels, ins, total: n };
        }

        // Initialize and inject data into the DOM
        window.onload = () => {
            // Set Ground Truth
            document.getElementById('ground-truth-container').innerText = groundTruthText;

            // Process MIH
            const mihData = calculateWER(groundTruthText, mihText);
            document.getElementById('mih-container').innerHTML = mihData.html;
            document.getElementById('mih-wer').innerText = `WER: ${mihData.wer}%`;
            document.getElementById('mih-stats').innerHTML = `
                <span class="text-yellow-600 dark:text-yellow-400">Sub: ${mihData.subs}</span>
                <span class="text-red-600 dark:text-red-400">Del: ${mihData.dels}</span>
                <span class="text-green-600 dark:text-green-400">Ins: ${mihData.ins}</span>
            `;

            // Process DeepGram
            const dgData = calculateWER(groundTruthText, deepgramText);
            document.getElementById('dg-container').innerHTML = dgData.html;
            document.getElementById('dg-wer').innerText = `WER: ${dgData.wer}%`;
            document.getElementById('dg-stats').innerHTML = `
                <span class="text-yellow-600 dark:text-yellow-400">Sub: ${dgData.subs}</span>
                <span class="text-red-600 dark:text-red-400">Del: ${dgData.dels}</span>
                <span class="text-green-600 dark:text-green-400">Ins: ${dgData.ins}</span>
            `;

            // Process OpenAI
            const openAiData = calculateWER(groundTruthText, openAiText);
            document.getElementById('openai-container').innerHTML = openAiData.html;
            document.getElementById('openai-wer').innerText = `WER: N/A`;
            document.getElementById('openai-stats').innerHTML = `
                <span class="text-yellow-600 dark:text-yellow-400">Sub: ${openAiData.subs}</span>
                <span class="text-red-600 dark:text-red-400">Del: ${openAiData.dels}</span>
                <span class="text-green-600 dark:text-green-400">Ins: ${openAiData.ins}</span>
            `;
        };

        // Theme toggle logic
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
                themeToggleLightIcon.classList.add('hidden');
            }
        }
        
        if (themeToggleBtn) {
            updateIcons();
            themeToggleBtn.addEventListener('click', function() {
                document.documentElement.classList.toggle('dark');
                updateIcons();
                if (document.documentElement.classList.contains('dark')) {
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    localStorage.setItem('color-theme', 'light');
                }
            });
        }
    </script>
</body>
</html>
