            ["لئے", "لیے", "کیلئے", "کیلیے"],
            ["کر", "کرکے", "کے"],
            ["ہوتی", "ہوتے", "ہوتا", "ہونے", "ہونا", "ہوں", "ہوگی"],
            ["ہے", "ہیں"],
            ["یہ", "وہ", "اس", "ان"],
            ["اور", "aur", "and"],
            ["میں", "می"],
            ["دیتی", "دیتے", "دیتا"]
        ];

        function areWordsEqual(w1, w2) {
            if (w1 === w2) return true;
            for (let group of equivalenceGroups) {
                if (group.includes(w1) && group.includes(w2)) {
                    return true;
                }
            }
            return false;
        }

        // Custom Order-Agnostic Alignment Algorithm
        function calculateWER(refText, hypText) {
            const normalize = w => w.toLowerCase().replace(/[.,!?"()،۔؛٪|؟]/g, '');
            const refTokensOrig = refText.trim().split(/\s+/).filter(w => w.length > 0);
            const hypTokensOrig = hypText.trim().split(/\s+/).filter(w => w.length > 0);
            
            const refTokens = refTokensOrig.map(normalize);
            const hypTokens = hypTokensOrig.map(normalize);

            let refUsed = new Array(refTokens.length).fill(false);
            let hypType = new Array(hypTokens.length).fill('I'); 
            let hypRefIdx = new Array(hypTokens.length).fill(-1);

            // Pass 1A: Exact alignment 
            for (let j = 0; j < hypTokens.length; j++) {
                let bestMatchIdx = -1;
                let minDistance = Infinity;
                
                for (let i = 0; i < refTokens.length; i++) {
                    if (!refUsed[i] && refTokens[i] === hypTokens[j]) {
                        let dist = Math.abs(i - j * (refTokens.length / hypTokens.length));
                        if (dist < minDistance) {
                            minDistance = dist;
                            bestMatchIdx = i;
                        }
                    }
                }
                
                if (bestMatchIdx !== -1) {
                    refUsed[bestMatchIdx] = true;
                    hypType[j] = 'M';
                    hypRefIdx[j] = bestMatchIdx;
                }
            }

            // Pass 1B: Equivalence alignment
            for (let j = 0; j < hypTokens.length; j++) {
                if (hypType[j] === 'M') continue; 
                
                let bestMatchIdx = -1;
                let minDistance = Infinity;
                
                for (let i = 0; i < refTokens.length; i++) {
                    if (!refUsed[i] && areWordsEqual(refTokens[i], hypTokens[j])) {
                        let dist = Math.abs(i - j * (refTokens.length / hypTokens.length));
                        if (dist < minDistance) {
                            minDistance = dist;
                            bestMatchIdx = i;
                        }
                    }
                }
                
                if (bestMatchIdx !== -1) {
                    refUsed[bestMatchIdx] = true;
                    hypType[j] = 'M';
                    hypRefIdx[j] = bestMatchIdx;
                }
            }

            // Pass 2: Rendering and Stats calculation
            let html = '';
            let subs = 0, dels = 0, ins = 0;
            let refPtr = 0;

            for (let j = 0; j < hypTokens.length; j++) {
                if (hypType[j] === 'M') {
                    let r_idx = hypRefIdx[j];
                    
                    for (let i = refPtr; i < r_idx; i++) {
                        if (!refUsed[i]) {
                            html += `<span class="bg-red-100 dark:bg-red-900/40 text-red-800 dark:text-red-300 px-1.5 py-0.5 custom-rounded inline-block mx-0.5 line-through border border-red-300 dark:border-red-800 cursor-help transition-colors hover:bg-red-200 dark:hover:bg-red-800" title="Missing Word">${refTokensOrig[i]}</span> `;
                            dels++;
                            refUsed[i] = true;
                        }
                    }
                    
                    html += `<span>${hypTokensOrig[j]}</span> `;
                    refPtr = Math.max(refPtr, r_idx + 1);
                    
                } else {
                    let subIdx = -1;
                    for (let i = refPtr; i <= refPtr + 3 && i < refTokens.length; i++) {
                        if (!refUsed[i]) {
                            subIdx = i;
                            break;
                        }
                    }
                    
                    if (subIdx !== -1) {
                        html += `<span class="bg-yellow-200 dark:bg-yellow-900/50 text-yellow-900 dark:text-yellow-200 px-1.5 py-0.5 custom-rounded inline-block mx-0.5 border border-yellow-300 dark:border-yellow-700 cursor-help transition-colors hover:bg-yellow-300 dark:hover:bg-yellow-800" title="Changed (Original: ${refTokensOrig[subIdx]})">${hypTokensOrig[j]}</span> `;
                        subs++;
                        refUsed[subIdx] = true;
                        refPtr = Math.max(refPtr, subIdx + 1);
                    } else {
                        html += `<span class="bg-green-200 dark:bg-green-900/50 text-green-900 dark:text-green-200 px-1.5 py-0.5 custom-rounded inline-block mx-0.5 border border-green-300 dark:border-green-700 cursor-help transition-colors hover:bg-green-300 dark:hover:bg-green-800" title="Inserted Word">${hypTokensOrig[j]}</span> `;
                        ins++;
                    }
                }
            }

            for (let i = 0; i < refTokens.length; i++) {
                if (!refUsed[i]) {
                    html += `<span class="bg-red-100 dark:bg-red-900/40 text-red-800 dark:text-red-300 px-1.5 py-0.5 custom-rounded inline-block mx-0.5 line-through border border-red-300 dark:border-red-800 cursor-help transition-colors hover:bg-red-200 dark:hover:bg-red-800" title="Missing Word">${refTokensOrig[i]}</span> `;
                    dels++;
                }
            }

            const n = refTokens.length;
            const wer = n > 0 ? ((subs + dels + ins) / n) * 100 : 0;

            return { html, wer: wer.toFixed(1), subs, dels, ins, total: n };
        }

        // Initialize and inject data into the DOM
        window.onload = () => {
            document.getElementById('ground-truth-container').innerText = groundTruthText;

            // Process MIH
            const mihData = calculateWER(groundTruthText, mihText);
            document.getElementById('mih-container').innerHTML = mihData.html;
            document.getElementById('mih-wer').innerText = `WER: ${mihData.wer}%`;
            document.getElementById('mih-stats').innerHTML = `
                <span class="text-yellow-600 dark:text-yellow-400">Sub: ${mihData.subs}</span>
                <span class="text-red-600 dark:text-red-400">Del: ${mihData.dels}</span>
                <span class="text-green-600 dark:text-green-400">Ins: ${mihData.ins}</span>
            `;

            // Process DeepGram
            const dgData = calculateWER(groundTruthText, deepgramText);
            document.getElementById('dg-container').innerHTML = dgData.html;
            document.getElementById('dg-wer').innerText = `WER: ${dgData.wer}%`;
            document.getElementById('dg-stats').innerHTML = `
                <span class="text-yellow-600 dark:text-yellow-400">Sub: ${dgData.subs}</span>
                <span class="text-red-600 dark:text-red-400">Del: ${dgData.dels}</span>
                <span class="text-green-600 dark:text-green-400">Ins: ${dgData.ins}</span>
            `;

            // Process OpenAI
            const openAiData = calculateWER(groundTruthText, openAiText);
            document.getElementById('openai-container').innerHTML = openAiData.html;
            document.getElementById('openai-wer').innerText = `WER: N/A`;
            document.getElementById('openai-stats').innerHTML = `
                <span class="text-yellow-600 dark:text-yellow-400">Sub: ${openAiData.subs}</span>
                <span class="text-red-600 dark:text-red-400">Del: ${openAiData.dels}</span>
                <span class="text-green-600 dark:text-green-400">Ins: ${openAiData.ins}</span>
            `;
        };

        // Theme toggle logic
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
                themeToggleLightIcon.classList.add('hidden');
            }
        }
        
        if (themeToggleBtn) {
            updateIcons();
            themeToggleBtn.addEventListener('click', function() {
                document.documentElement.classList.toggle('dark');
                updateIcons();
                if (document.documentElement.classList.contains('dark')) {
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    localStorage.setItem('color-theme', 'light');
                }
            });
        }
    </script>
</body>
</html>
